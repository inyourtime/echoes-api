openapi: 3.0.3
info:
  title: Echoes API
  description: API documentation for Echoes
  version: 0.0.0
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Bearer token authentication
  schemas:
    responses:
      type: object
      required:
        - badRequest
        - unauthorized
        - internalServerError
        - serviceUnavailable
        - conflict
        - notFound
        - forbidden
      properties:
        badRequest:
          type: object
          required:
            - statusCode
            - error
            - message
          properties:
            statusCode:
              type: number
              const: 400
            error:
              type: string
              const: Bad Request
            message:
              type: string
              example: Bad Request
          title: 400 Bad Request
        unauthorized:
          type: object
          required:
            - statusCode
            - error
            - message
          properties:
            statusCode:
              type: number
              const: 401
            error:
              type: string
              const: Unauthorized
            message:
              type: string
              example: Unauthorized
          title: 401 Unauthorized
        internalServerError:
          type: object
          required:
            - statusCode
            - error
            - message
          properties:
            statusCode:
              type: number
              const: 500
            error:
              type: string
              const: Internal Server Error
            message:
              type: string
              example: Internal server error
          title: 500 Internal Server Error
        serviceUnavailable:
          type: object
          required:
            - statusCode
            - error
            - message
          properties:
            statusCode:
              type: number
              const: 503
            error:
              type: string
              const: Service Unavailable
            message:
              type: string
              example: Service unavailable
          title: 503 Service Unavailable
        conflict:
          type: object
          required:
            - statusCode
            - error
            - message
          properties:
            statusCode:
              type: number
              const: 409
            error:
              type: string
              const: Conflict
            message:
              type: string
              example: Conflict
          title: 409 Conflict
        notFound:
          type: object
          required:
            - statusCode
            - error
            - message
          properties:
            statusCode:
              type: number
              const: 404
            error:
              type: string
              const: Not Found
            message:
              type: string
              example: Not Found
          title: 404 Not Found
        forbidden:
          type: object
          required:
            - statusCode
            - error
            - message
          properties:
            statusCode:
              type: number
              const: 403
            error:
              type: string
              const: Forbidden
            message:
              type: string
              example: Forbidden
          title: 403 Forbidden
      title: Responses
      description: Common response schemas
paths:
  /api/v1/test:
    get:
      security: []
      responses:
        "200":
          description: Default Response
  /api/v1/auth/register:
    post:
      summary: Register a new user
      tags: &a1
        - Auth
      description: Register a new user with email and password. An email verification
        token will be sent to the user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - name
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 255
                  example: inyourtimeguy@gmail.com
                password:
                  type: string
                  minLength: 8
                  maxLength: 512
                  example: "12345678"
                name:
                  type: string
                  minLength: 1
                  maxLength: 255
                  example: John Doe
      security: []
      responses:
        "201":
          description: Register response
          content:
            application/json:
              schema:
                type: object
                required:
                  - user
                  - message
                properties:
                  user:
                    type: object
                    required:
                      - id
                      - email
                      - name
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                      name:
                        type: string
                  message:
                    type: string
                description: Register response
        "409":
          description: User already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responses/properties/conflict"
  /api/v1/auth/login:
    post:
      summary: Login a user
      tags: *a1
      description: Login a user with email and password. Returns access token and
        refresh token (via cookie). If email is not verified, returns 403.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 255
                  example: inyourtimeguy@gmail.com
                password:
                  type: string
                  maxLength: 512
                  example: "12345678"
      security: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - accessToken
                properties:
                  accessToken:
                    type: string
                    example: access_token
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responses/properties/unauthorized"
        "403":
          description: Email not verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responses/properties/forbidden"
  /api/v1/auth/forgot-password:
    post:
      summary: Request a password reset email
      tags: *a1
      description: Send a password reset email if the account exists. Always returns
        success to prevent email enumeration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  minLength: 1
                  example: inyourtimeguy@gmail.com
      security: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
  /api/v1/auth/verify-email:
    post:
      summary: Verify email address
      tags: *a1
      description: Verify email address using token from email. Returns success message.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  minLength: 1
                  example: verification_token
      security: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responses/properties/badRequest"
  /api/v1/auth/resend-verification:
    post:
      summary: Resend verification email
      tags: *a1
      description: Resend verification email to user. Always returns success to
        prevent email enumeration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  minLength: 1
                  example: inyourtimeguy@gmail.com
      security: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
  /api/v1/auth/reset-password:
    post:
      summary: Reset password using email token
      tags: *a1
      description: Reset the user password using a valid password reset token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - password
              properties:
                token:
                  type: string
                  minLength: 1
                  example: password_reset_token
                password:
                  type: string
                  minLength: 8
                  maxLength: 512
                  example: "12345678"
      security: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responses/properties/badRequest"
  /api/v1/auth/me:
    get:
      summary: Get current user information
      tags: *a1
      description: Retrieve the authenticated user's information
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Get current user response
          content:
            application/json:
              schema:
                type: object
                required:
                  - user
                properties:
                  user:
                    type: object
                    required:
                      - id
                      - email
                      - name
                      - avatarUrl
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                      name:
                        anyOf:
                          - type: string
                          - type: "null"
                      avatarUrl:
                        anyOf:
                          - type: string
                          - type: "null"
                description: Get current user response
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responses/properties/unauthorized"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responses/properties/notFound"
  /api/v1/auth/logout:
    post:
      summary: Logout user
      tags: *a1
      description: Logout user by invalidating the refresh token and clearing the cookie
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responses/properties/unauthorized"
  /api/v1/auth/refresh:
    post:
      summary: Refresh access token
      tags: *a1
      description: Generate a new access token using a valid refresh token
      security: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - accessToken
                properties:
                  accessToken:
                    type: string
                    example: access_token
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responses/properties/unauthorized"
        "403":
          description: Account disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responses/properties/forbidden"
  /api/v1/push/tokens:
    post:
      summary: Register a push token
      tags: &a2
        - Push
      description: Register or refresh a Firebase Cloud Messaging token for the
        authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                platform:
                  enum:
                    - web
                token:
                  type: string
                  maxLength: 4096
                  minLength: 1
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                  - pushToken
                properties:
                  message:
                    type: string
                  pushToken:
                    type: object
                    required:
                      - createdAt
                      - id
                      - lastRegisteredAt
                      - platform
                      - updatedAt
                      - userAgent
                      - userId
                    properties:
                      createdAt:
                        type: string
                        format: date-time
                      id:
                        type: string
                        format: uuid
                      lastRegisteredAt:
                        type: string
                        format: date-time
                      platform:
                        enum:
                          - web
                      updatedAt:
                        type: string
                        format: date-time
                      userAgent:
                        anyOf:
                          - type: string
                          - type: "null"
                      userId:
                        type: string
                        format: uuid
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responses/properties/unauthorized"
    delete:
      summary: Delete a push token
      tags: *a2
      description: Remove a Firebase Cloud Messaging token for the authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  maxLength: 4096
                  minLength: 1
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responses/properties/unauthorized"
  /api/v1/push/test:
    post:
      summary: Send a test push notification
      tags: *a2
      description: Send a test push notification to all registered devices of the
        authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  type: string
                  default: การแจ้งเตือนทดสอบจาก Echoes ส่งมาถึงอุปกรณ์นี้แล้ว
                  maxLength: 240
                  minLength: 1
                title:
                  type: string
                  default: Echoes
                  maxLength: 120
                  minLength: 1
                url:
                  type: string
                  default: /timeline
                  minLength: 1
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - failureCount
                  - invalidatedCount
                  - message
                  - successCount
                properties:
                  failureCount:
                    type: number
                    minimum: 0
                  invalidatedCount:
                    type: number
                    minimum: 0
                  message:
                    type: string
                  successCount:
                    type: number
                    minimum: 0
        "400":
          description: No push token registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responses/properties/badRequest"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responses/properties/unauthorized"
        "503":
          description: Firebase messaging is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responses/properties/serviceUnavailable"
  /api/v1/push/on-this-day:
    post:
      summary: Send an On This Day push notification
      tags: *a2
      description: Find matching memories from the same calendar day in previous years
        and send a push notification to the authenticated user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                date:
                  type: string
                  format: date
                  description: Target date to match memories against in YYYY-MM-DD format
                url:
                  type: string
                  default: /timeline/:id
                  description: Frontend path template for the memory detail page. Use :id for
                    userTrackId.
                  minLength: 1
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - date
                  - failureCount
                  - invalidatedCount
                  - memoryCount
                  - message
                  - selectedMemory
                  - sent
                  - status
                  - successCount
                properties:
                  date:
                    type: string
                    format: date
                  failureCount:
                    type: number
                    minimum: 0
                  invalidatedCount:
                    type: number
                    minimum: 0
                  memoryCount:
                    type: number
                    minimum: 0
                  message:
                    type: string
                  selectedMemory:
                    anyOf:
                      - type: object
                        required:
                          - listenedAt
                          - track
                          - userTrackId
                          - yearsAgo
                        properties:
                          listenedAt:
                            type: string
                            format: date-time
                          track:
                            type: object
                            required:
                              - artist
                              - title
                            properties:
                              artist:
                                type: string
                              title:
                                type: string
                          userTrackId:
                            type: string
                          yearsAgo:
                            type: integer
                            minimum: 1
                      - type: "null"
                  sent:
                    type: boolean
                  status:
                    anyOf:
                      - type: string
                        const: processed
                      - type: string
                        const: no_memories
                      - type: string
                        const: no_push_tokens
                  successCount:
                    type: number
                    minimum: 0
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responses/properties/badRequest"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responses/properties/unauthorized"
        "503":
          description: Firebase messaging is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responses/properties/serviceUnavailable"
  /api/v1/stats/top-artists:
    get:
      summary: Get top artists
      tags: &a3
        - Stats
      description: Get the most saved artists for the authenticated user
      parameters:
        - schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 50
          in: query
          name: limit
          required: false
          description: Number of top artists to return
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - artists
                properties:
                  artists:
                    type: array
                    items:
                      type: object
                      required:
                        - artist
                        - count
                      properties:
                        artist:
                          type: string
                          description: Artist name
                        count:
                          type: integer
                          description: Number of tracks saved
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responses/properties/unauthorized"
  /api/v1/stats/monthly-activity:
    get:
      summary: Get monthly activity
      tags: *a3
      description: Get track save activity per month for the last N months
      parameters:
        - schema:
            type: integer
            default: 12
            minimum: 1
            maximum: 24
          in: query
          name: months
          required: false
          description: Number of months to look back
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - activity
                properties:
                  activity:
                    type: array
                    items:
                      type: object
                      required:
                        - month
                        - count
                      properties:
                        month:
                          type: string
                          description: Month in YYYY-MM format
                        count:
                          type: integer
                          description: Number of tracks saved in this month
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responses/properties/unauthorized"
  /api/v1/stats/tag-distribution:
    get:
      summary: Get tag distribution
      tags: *a3
      description: Get the distribution of tags used across all user tracks
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - distribution
                  - totalTagged
                properties:
                  distribution:
                    type: array
                    items:
                      type: object
                      required:
                        - tagId
                        - name
                        - count
                        - percentage
                      properties:
                        tagId:
                          type: string
                          format: uuid
                          description: Tag ID
                        name:
                          type: string
                          description: Tag name
                        color:
                          type: string
                          description: Tag color hex code
                        count:
                          type: integer
                          description: Number of entries with this tag
                        percentage:
                          type: integer
                          description: Percentage of total tagged entries (0-100)
                  totalTagged:
                    type: integer
                    description: Total number of tagged entries
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responses/properties/unauthorized"
  /api/v1/stats/overview:
    get:
      summary: Get overview stats
      tags: *a3
      description: Get combined overview statistics for the user dashboard
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - totalTracks
                  - totalArtists
                  - uniqueTagsUsed
                  - thisMonthCount
                properties:
                  totalTracks:
                    type: integer
                    description: Total number of tracks saved
                  totalArtists:
                    type: integer
                    description: Number of unique artists
                  uniqueTagsUsed:
                    type: integer
                    description: Number of unique tags used
                  thisMonthCount:
                    type: integer
                    description: Number of tracks saved this month
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responses/properties/unauthorized"
  /api/v1/tags:
    get:
      summary: List user tags
      tags: &a4
        - Tag
      description: Get all tags created by the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - tags
                properties:
                  tags:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - userId
                        - name
                        - color
                        - createdAt
                      properties:
                        id:
                          type: string
                          format: uuid
                        userId:
                          type: string
                          format: uuid
                        name:
                          type: string
                        color:
                          anyOf:
                            - type: string
                            - type: "null"
                        createdAt:
                          type: string
                          format: date-time
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responses/properties/unauthorized"
    post:
      summary: Create tag
      tags: *a4
      description: Create a new tag for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  minLength: 1
                  description: Tag name
                color:
                  type: string
                  description: Hex color code
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - tag
                properties:
                  tag:
                    type: object
                    required:
                      - id
                      - userId
                      - name
                      - color
                      - createdAt
                    properties:
                      id:
                        type: string
                        format: uuid
                      userId:
                        type: string
                        format: uuid
                      name:
                        type: string
                      color:
                        anyOf:
                          - type: string
                          - type: "null"
                      createdAt:
                        type: string
                        format: date-time
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responses/properties/badRequest"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responses/properties/unauthorized"
        "409":
          description: Tag already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responses/properties/conflict"
  /api/v1/tags/{id}:
    get:
      summary: Get tag by ID
      tags: *a4
      description: Get a single tag by its ID
      parameters:
        - schema:
            type: string
            format: uuid
          in: path
          name: id
          required: true
          description: Tag ID
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                required:
                  - tag
                properties:
                  tag:
                    type: object
                    required:
                      - id
                      - userId
                      - name
                      - color
                      - createdAt
                    properties:
                      id:
                        type: string
                        format: uuid
                      userId:
                        type: string
                        format: uuid
                      name:
                        type: string
                      color:
                        anyOf:
                          - type: string
                          - type: "null"
                      createdAt:
                        type: string
                        format: date-time
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/responses/properties/unauthorized"
        "404":
          description: Tag not found
          content:
            application/json:
